<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">NutriBase Food Composition Table</title>
  <desc id="desc">Food composition data for Sri Lanka and India with energy, macro, and micronutrient values.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1c2430"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g fill="#e6edf3" font-family="Arial, Helvetica, sans-serif">
    <text x="90" y="220" font-size="64" font-weight="700">NutriBase</text>
    <text x="90" y="300" font-size="36" font-weight="500">Food Composition Table</text>
    <text x="90" y="370" font-size="28" fill="#8b949e">Sri Lanka &amp; India · Per 100g edible portion</text>
  </g>
  <circle cx="1040" cy="210" r="90" fill="#e8c547"/>
  <circle cx="1040" cy="210" r="64" fill="#0d1117"/>
  <text x="1040" y="225" text-anchor="middle" font-size="54" fill="#e8c547" font-family="Arial, Helvetica, sans-serif">🌿</text>
</svg>
